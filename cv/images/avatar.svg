<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d1633"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c77eff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ff7ad9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c77eff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c77eff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#c77eff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#grid)"/>
  <circle cx="200" cy="170" r="160" fill="url(#glow)"/>

  <!-- Stylized portrait silhouette -->
  <g transform="translate(200 220)">
    <!-- shoulders -->
    <path d="M -130 130 C -130 60, -70 30, 0 30 C 70 30, 130 60, 130 130 L 130 160 L -130 160 Z" fill="#1a1230" stroke="url(#accent)" stroke-width="2"/>
    <!-- head -->
    <circle cx="0" cy="-30" r="68" fill="#1a1230" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- inner glow ring -->
    <circle cx="0" cy="-30" r="60" fill="none" stroke="#c77eff" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 6"/>
  </g>

  <!-- Initials -->
  <text x="200" y="208" text-anchor="middle"
        font-family="'Bricolage Grotesque', system-ui, sans-serif"
        font-weight="800" font-size="78" letter-spacing="-2"
        fill="url(#accent)">MA</text>

  <!-- Pixel corner accents -->
  <g fill="#c77eff">
    <rect x="20" y="20" width="6" height="6"/>
    <rect x="32" y="20" width="6" height="6"/>
    <rect x="20" y="32" width="6" height="6"/>

    <rect x="374" y="20" width="6" height="6"/>
    <rect x="362" y="20" width="6" height="6"/>
    <rect x="374" y="32" width="6" height="6"/>

    <rect x="20" y="374" width="6" height="6"/>
    <rect x="32" y="374" width="6" height="6"/>
    <rect x="20" y="362" width="6" height="6"/>

    <rect x="374" y="374" width="6" height="6"/>
    <rect x="362" y="374" width="6" height="6"/>
    <rect x="374" y="362" width="6" height="6"/>
  </g>
</svg>
