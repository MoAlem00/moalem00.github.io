<!DOCTYPE html>
<html>
  <head>
    <title>Contact</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background: #7c7c7c;
        cursor: none;
        overflow: hidden;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      @font-face {
        font-family: 'Jersey10';
        src: url('fonts/Jersey10-Regular.ttf');
      }
    </style>
  </head>
  <body>
    <canvas id="contactCanvas"></canvas>
    <script>
      const canvas = document.getElementById('contactCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.imageSmoothingEnabled = false;

      const github = new Image();
      github.src = 'sprites/github-shop.png';

      const gmail = new Image();
      gmail.src = 'sprites/gmail-shop.png';

      const youtube = new Image();
      youtube.src = 'sprites/youtube-shop.png';

      const linkedin = new Image();
      linkedin.src = 'sprites/linkedin-shop.png';

      const itchio = new Image();
      itchio.src = 'sprites/itchio-shop.png';

      const playerIdleImg = new Image();
      playerIdleImg.src = 'sprites/player-idle.png';

      const playerWalkImg = new Image();
      playerWalkImg.src = 'sprites/player-walk.png';

      const gunImg = new Image();
      gunImg.src = 'sprites/gun.png';

      const ground = new Image();
      ground.src = 'sprites/ground1.png';

      const crosshairImg = new Image();
      crosshairImg.src = 'sprites/crosshair.png';

      const portalImg = new Image();
      portalImg.src = 'sprites/portal.png';

      const portal = {
        x: canvas.width / 2 - 50,
        y: canvas.height - 128,
        width: 160,
        height: 32,
        frame: 0,
        frameTimer: 0
      };

      const shops = [
      {
        img: github,
        x: -50,
        y: canvas.height / 2 - 400,
        width: 600,
        height: 327,
        label: 'GitHub',
        url: 'https://github.com/MoAlem00',
        interactX: 220,  // x position where player triggers F prompt
        colliderX: 100,
        colliderY: canvas.height / 2 - 350,
        colliderW: 300,
        colliderH: 200
      },
      {
        img: gmail,
        x: -150,
        y: canvas.height / 2 + 50,
        width: 600,
        height: 327,
        label: 'Gmail',
        url: 'mailto:mohammad.alem.dev@gmail.com',
        interactX: 220,
        colliderX: 20,
        colliderY: canvas.height -380,
        colliderW: 250,
        colliderH: 200
      },
      {
        img: youtube,
        x: canvas.width - 450,
        y: canvas.height / 2 - 400,
        width: 600,
        height: 327,
        label: 'YouTube',
        url: 'https://www.youtube.com/@MohammadAlem001',
        interactX: canvas.width - 320,
        colliderX: canvas.width / 2 + 770,
        colliderY: canvas.height / 2 - 350,
        colliderW: 250,
        colliderH: 200
      },
      {
        img: linkedin,
        x: canvas.width - 450,
        y: canvas.height / 2 + 50,
        width: 600,
        height: 327,
        label: 'LinkedIn',
        url: 'https://www.linkedin.com/in/mohamadalim/',
        interactX: canvas.width - 320,
        colliderX: canvas.width / 2 + 750,
        colliderY: canvas.height / 2 + 100,
        colliderW: 250,
        colliderH: 200
      },
      {
        img: itchio,
        x: canvas.width / 2 - 150,
        y: -50,
        width: 400,
        height: 400,
        label: 'itch.io',
        url: 'https://mohammadalem.itch.io/',
        interactX: canvas.width / 2 - 150,
        colliderX: canvas.width / 2 - 80,
        colliderY: canvas.height / 2 - 450,
        colliderW: 270,
        colliderH: 200
      }
      ];
      
      let nearShop = null;

      window.addEventListener('keydown', function(e) {
      keys[e.key] = true;
      if (e.key === 'f' || e.key === 'F') {
        if (nearShop) {
          window.open(nearShop.url, '_blank');
        }
      }
      });

      let mouseX = 0;
      let mouseY = 0;
      window.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });


      let keys = {};

      window.addEventListener('keydown', function(e) {
      keys[e.key] = true;
      });

      window.addEventListener('keyup', function(e) {
      keys[e.key] = false;
      });

      let player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      speed: 1.5,
      frame: 0,
      frameTimer: 0,
     isWalking: false,
    };

    

    function updatePlayer(){
    player.prevX = player.x;
    player.prevY = player.y;

    player.isWalking = false;
    if (keys['w'] || keys['ArrowUp']) {
      player.y -= player.speed;
      player.isWalking = true;
    }
    if (keys['s'] || keys['ArrowDown']) {
      player.y += player.speed;
      player.isWalking = true;
    }
    if (keys['a'] || keys['ArrowLeft']) {
      player.x -= player.speed;
      player.isWalking = true;
    }
    if (keys['d'] || keys['ArrowRight']) {
      player.x += player.speed;
      player.isWalking = true;
    }
    player.x = Math.max(10, Math.min(canvas.width - 30 , player.x));
    player.y = Math.max(0, Math.min(canvas.height - 50, player.y));
    player.frameTimer++;
    if (player.frameTimer > 16) {
      player.frameTimer = 0;
      player.frame++;
      if (player.frame >= 6) {
        player.frame = 0;
      }
    }
    for (let i = 0; i < shops.length; i++) {
      let shop = shops[i];
  
      // check if player overlaps with shop
      if (player.x + 40 > shop.colliderX &&
        player.x < shop.colliderX + shop.colliderW &&
        player.y + 40> shop.colliderY &&
        player.y < shop.colliderY + shop.colliderH) {
    
        // push player back to previous position
        player.x = player.prevX;
        player.y = player.prevY;
        }
    }
    nearShop = null;
    for (let i = 0; i < shops.length; i++) {
      let shop = shops[i];
      const dx = (player.x + 20) - (shop.x + shop.width / 2);
      const dy = (player.y + 20) - (shop.y + shop.height / 2);
      const distance = Math.sqrt(dx * dx + dy * dy);
    
      if (distance < 200) {
        nearShop = shop;
      }
    }
    const pdx = (player.x + 20) - (portal.x + 48);
    const pdy = (player.y + 20) - (portal.y + 48);
    const portalDist = Math.sqrt(pdx * pdx + pdy * pdy);
    if (portalDist < 40) {
      window.location.href = 'index.html';
    }
    }

    function drawPortal() {
    portal.frameTimer++;
    if (portal.frameTimer > 8) {
      portal.frameTimer = 0;
      portal.frame++;
      if (portal.frame >= 5) portal.frame = 0;
    }

    ctx.drawImage(
      portalImg,
      portal.frame * 32, // each frame is 32px wide (160 ÷ 5)
      0,
      32,
      32,
      portal.x,
      portal.y,
      32 * 4,
      32 * 4
    );
    ctx.font = '40px Jersey10';
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.fillText('HOME', portal.x + 60, portal.y - 10);
    }

    function drawPlayer() {
    const img = player.isWalking ? playerWalkImg : playerIdleImg;
    const frameWidth = player.isWalking ? 10 : 10;
    const frameHeight = player.isWalking ? 17 : 16;
    ctx.drawImage(
      img,
      player.frame * frameWidth,
      0,
      frameWidth,
      frameHeight,
      player.x,
      player.y,
      frameWidth * 4,
      frameHeight * 4
    );
    // Draw gun on top
    // calculate angle from player center to mouse
    const centerX = player.x + 15; // horizontal center of player
    const centerY = player.y + 35; // vertical center of player
    const angle = Math.atan2(mouseY - centerY, mouseX - centerX);
    const facingLeft = mouseX < centerX;

    // draw rotated gun
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(angle);
    if(facingLeft) {
      ctx.scale(1, -1); // flip vertically when facing left
      ctx.drawImage(
        gunImg,
        -9,          // draw from rotation origin
        -9,         // offset up slightly so gun is centered
        16 * 3,
        10 * 3
      );
    }else{ //face right
      ctx.drawImage(
        gunImg,
        -8,          // draw from rotation origin
        -8,         // offset up slightly so gun is centered
        16 * 3,
        10 * 3
      );
    }
    ctx.restore();
    }

    function drawShops() {
      for (let i = 0; i < shops.length; i++) {
        let shop = shops[i];
        ctx.drawImage(shop.img, shop.x, shop.y, shop.width, shop.height);
      }
    }


    function drawCrosshair() {
        const size = 32; // adjust to your sprite size
        ctx.drawImage(
        crosshairImg,
        mouseX - size / 2,
        mouseY - size / 2,
        size,
        size
        );
      }

    function contactLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(ground, 0, 0, canvas.width, canvas.height);
      drawShops();
      drawPlayer();
      updatePlayer();
      drawPortal();
      drawCrosshair();
      requestAnimationFrame(contactLoop);
      if (nearShop) {
        ctx.font = '40px Jersey10';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText('[F] Visit ' + nearShop.label, player.x + 20, player.y - 20);
      }
    }

      let imagesLoaded = 0;
      const totalImages = 10;

      function onImageLoad() {
        imagesLoaded++;
        if (imagesLoaded >= totalImages) {
          const myFont = new FontFace('Jersey10', 'url(fonts/Jersey10-Regular.ttf)');
          myFont.load().then(function(loaded) {
            document.fonts.add(loaded);
            contactLoop();
      });
      }
      }
      github.onload = onImageLoad;
      gmail.onload = onImageLoad;
      youtube.onload = onImageLoad;
      linkedin.onload = onImageLoad;
      itchio.onload = onImageLoad;
      playerIdleImg.onload = onImageLoad;
      playerWalkImg.onload = onImageLoad;
      gunImg.onload = onImageLoad;
      ground.onload = onImageLoad;
      portalImg.onload = onImageLoad;
    </script>
  </body>
</html>
